  <!-- Gold Partial Derivative Symbol -->
  <text x="410" y="230" font-family="'Times New Roman', Times, serif" font-size="180" font-style="italic" font-weight="bold" fill="#D4AF37" text-anchor="middle">∂</text>
</svg>
