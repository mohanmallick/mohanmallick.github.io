<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Dark Navy Background with smooth rounded corners -->
  <rect width="512" height="512" rx="112" fill="#0A1931" />
  
  <!-- Pucci Extremal Operator Script M (\mathcal{M}) in Cream/White -->
